# WARNING: When you rename a workflow filename, remember to update the Trusted Publishing settings as well.
# https://www.npmjs.com/package/@tasshi/configs/access
# ref. https://docs.npmjs.com/trusted-publishers

name: Release
on:
  push:
    branches:
      - main

jobs:
  release:
    name: Release
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4
        id: release

  # https://github.com/googleapis/release-please-action/#automating-publication-to-npm
  # TODO: Switch to Trusted Publishing (OIDC) after the first release:
  # 1. Register this repository and workflow as a Trusted Publisher on npmjs.com
  #    (possible only after the package exists on npm).
  # 2. Uncomment the "OIDC:" lines below and remove NODE_AUTH_TOKEN (and the NPM_TOKEN secret).
  # Provenance attestations are generated automatically with Trusted Publishing.
  # ref. https://docs.npmjs.com/trusted-publishers
  publish:
    name: Publish
    permissions:
      contents: read
      # OIDC: id-token: write # Required for OIDC authn
    runs-on: ubuntu-latest
    needs: release
    if: ${{ needs.release.outputs.release_created }}
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
          registry-url: "https://registry.npmjs.org"
      - run: pnpm install
      - run: pnpm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  actions-timeline:
    needs: [release, publish]
    runs-on: ubuntu-latest
    if: ${{ !cancelled() }}
    steps:
      - uses: Kesin11/actions-timeline@7bf79990b7c09f5dfb570ac30b814ca597bd538e # v3
