name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  renovate-config-validator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@v7
        with:
          node-version-file: .node-version
      # pnpm dlx does not read pnpm-workspace.yaml, so pass minimumReleaseAge via env
      - run: pnpm --package=renovate dlx renovate-config-validator --strict default.json renovate.json
        env:
          # 14 days, aligned with the minimumReleaseAge of the Renovate preset (default.json)
          npm_config_minimum_release_age: "20160"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - uses: actions/setup-node@v7
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
